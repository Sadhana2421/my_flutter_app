workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      xcode: latest

    scripts:
      - name: Build IPA
        script: |
          cd ios-app
          chmod +x build-ipa.sh
          ./build-ipa.sh

    artifacts:
      - ios-app/**/*.ipa
